<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bot Engine WASM Demo</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #eee;
        min-height: 100vh;
      }
      h1 {
        color: #00d4ff;
        text-align: center;
      }
      .card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 1.5rem;
        margin: 1.5rem 0;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #00d4ff;
        font-weight: 500;
      }
      input,
      textarea {
        width: 100%;
        padding: 0.75rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.3);
        color: #fff;
        font-family: monospace;
        margin-bottom: 1rem;
        box-sizing: border-box;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: #00d4ff;
      }
      button {
        background: linear-gradient(135deg, #00d4ff 0%, #0077b6 100%);
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
      }
      button:disabled {
        background: #555;
        cursor: not-allowed;
        transform: none;
      }
      #results {
        white-space: pre-wrap;
        font-family: "Fira Code", monospace;
        font-size: 0.9rem;
        background: rgba(0, 0, 0, 0.4);
        padding: 1rem;
        border-radius: 8px;
        max-height: 400px;
        overflow-y: auto;
      }
      .stat {
        display: inline-block;
        padding: 0.5rem 1rem;
        background: rgba(0, 212, 255, 0.2);
        border-radius: 8px;
        margin: 0.25rem;
      }
      .stat-value {
        font-size: 1.2rem;
        font-weight: bold;
        color: #00d4ff;
      }
      .stat-label {
        font-size: 0.8rem;
        color: #999;
      }
      #version {
        text-align: center;
        color: #666;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <h1>🤖 Bot Engine WASM Demo</h1>
    <div id="version">Loading...</div>

    <div class="card">
      <h2>Configuration</h2>
      <label>Investment Amount (USD)</label>
      <input type="number" id="investment" value="100" step="10" />

      <label>Buy Threshold (% drop)</label>
      <input type="number" id="threshold" value="1" step="0.1" />

      <label>Spread</label>
      <input type="number" id="spread" value="0.1" step="0.01" />

      <label>Fee Rate</label>
      <input type="number" id="fee_rate" value="0.0004" step="0.0001" />
    </div>

    <div class="card">
      <h2>Price Data (JSON)</h2>
      <label>Array of {ts_ms, price}</label>
      <textarea id="prices" rows="6">
[
  {"ts_ms": 1700000000000, "price": "30000"},
  {"ts_ms": 1700000001000, "price": "29700"},
  {"ts_ms": 1700000002000, "price": "29600"},
  {"ts_ms": 1700000003000, "price": "29400"},
  {"ts_ms": 1700000004000, "price": "29000"},
  {"ts_ms": 1700000005000, "price": "29500"}
]</textarea
      >
    </div>

    <div class="card">
      <button id="runBtn" disabled>Run Backtest</button>
    </div>

    <div class="card">
      <h2>Results</h2>
      <div id="stats"></div>
      <div id="results">Click "Run Backtest" to see results...</div>
    </div>

    <script type="module">
      // Import the WASM module
      import init, { run_backtest, get_version } from "./pkg/bot_engine.js";

      async function main() {
        // Initialize WASM
        await init();

        // Show version
        document.getElementById("version").textContent = get_version();

        // Enable button
        const btn = document.getElementById("runBtn");
        btn.disabled = false;

        btn.addEventListener("click", async () => {
          try {
            btn.disabled = true;
            btn.textContent = "Running...";
            
            const prices = document.getElementById("prices").value;
            const config = JSON.stringify({
              investment: document.getElementById("investment").value,
              threshold: document.getElementById("threshold").value,
              spread: document.getElementById("spread").value,
              fee_rate: document.getElementById("fee_rate").value,
            });

            const resultJson = await run_backtest(prices, config);
            const result = JSON.parse(resultJson);

            // Display stats
            document.getElementById("stats").innerHTML = `
                        <div class="stat">
                            <div class="stat-value">${result.trade_count}</div>
                            <div class="stat-label">Trades</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">$${parseFloat(result.total_volume).toFixed(2)}</div>
                            <div class="stat-label">Volume</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${parseFloat(result.final_position_qty).toFixed(6)}</div>
                            <div class="stat-label">Position</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">$${parseFloat(result.total_fees).toFixed(4)}</div>
                            <div class="stat-label">Fees</div>
                        </div>
                    `;

            // Display full results
            document.getElementById("results").textContent = JSON.stringify(
              result,
              null,
              2,
            );
          } catch (err) {
            document.getElementById("results").textContent = "Error: " + err;
          } finally {
            btn.disabled = false;
            btn.textContent = "Run Backtest";
          }
        });
      }

      main().catch((err) => {
        document.getElementById("results").textContent =
          "Failed to load WASM: " + err;
      });
    </script>
  </body>
</html>
