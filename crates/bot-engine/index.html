<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WASM Grid Backtest - Performance Test</title>
    <style>
      body {
        font-family: monospace;
        background: #1a1a2e;
        color: #00ff88;
        padding: 20px;
      }
      button {
        background: #00d4ff;
        color: #000;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        font-size: 16px;
        margin: 5px;
      }
      button:disabled {
        background: #555;
        cursor: not-allowed;
      }
      button.secondary {
        background: #ff5555;
      }
      pre {
        background: #0d0d14;
        padding: 15px;
        border-radius: 8px;
        overflow-x: auto;
        max-height: 400px;
      }
      #status {
        color: #ffcc00;
        margin: 10px 0;
      }
      .stats {
        display: flex;
        gap: 20px;
        margin: 10px 0;
        flex-wrap: wrap;
      }
      .stat-box {
        background: #0d0d14;
        padding: 10px;
        border-radius: 5px;
      }
      .stat-value {
        font-size: 24px;
        color: #00d4ff;
      }
      .stat-label {
        font-size: 12px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>🧪 WASM Grid Backtest - Performance Test (ASYNC Real Strategy)</h1>

    <div>
      <button onclick="runTestPct(30)">30% Data (~300K)</button>
      <button onclick="runTestPct(50)">50% Data (~500K)</button>
      <button onclick="runTestPct(80)">80% Data (~800K)</button>
      <button onclick="runTestPct(100)">100% Data (1M)</button>
      <button class="secondary" onclick="clearCache()">Reload Data</button>
    </div>

    <div id="status">Ready - click a button to test</div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="quotes-count">-</div>
        <div class="stat-label">Quotes</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="price-range">-</div>
        <div class="stat-label">Price Range</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="exec-time">-</div>
        <div class="stat-label">Execution Time</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="fills-count">-</div>
        <div class="stat-label">Fills</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="cache-status">-</div>
        <div class="stat-label">Cache</div>
      </div>
    </div>

    <pre id="output">Results will appear here...</pre>

    <script type="module">
      // Create Web Worker for WASM backtest
      const worker = new Worker('./backtest-worker.js', { type: 'module' });
      
      let workerReady = false;
      let pendingBacktest = null;
      
      // Handle messages from worker
      worker.onmessage = function(e) {
        const { type, result, execTime, quotesCount, message, version } = e.data;
        
        if (type === 'ready') {
          workerReady = true;
          document.getElementById("status").textContent = "Worker Ready: " + version;
          document.getElementById("cache-status").textContent = "Worker";
          console.log("[Main] Worker ready:", version);
        }
        
        if (type === 'result') {
          console.log("[Main] Result received:", result);
          document.getElementById("exec-time").textContent = execTime.toFixed(0) + "ms";
          document.getElementById("fills-count").textContent = result.trade_count;
          document.getElementById("output").textContent = JSON.stringify(result, null, 2);
          document.getElementById("status").textContent = 
            `✅ Done in ${execTime.toFixed(0)}ms - ${result.trade_count} trades (Web Worker)`;
        }
        
        if (type === 'error') {
          console.error("[Main] Worker error:", message);
          document.getElementById("status").textContent = "Error: " + message;
          document.getElementById("output").textContent = message;
        }
      };
      
      worker.onerror = function(e) {
        console.error("[Main] Worker error:", e);
        document.getElementById("status").textContent = "Worker error: " + e.message;
      };
      
      // Initialize worker
      worker.postMessage({ type: 'init' });

      // Load prices from local JSON file (generated by generate_prices.py)
      const LOCAL_PRICES_FILE = "./scripts/prices.json";
      let cachedPrices = null;

      async function fetchPrices() {
        // Use in-memory cache to avoid reloading 51MB file
        if (cachedPrices) {
          console.log("[Main] Using in-memory cached prices:", cachedPrices.length);
          return cachedPrices;
        }

        console.log("[Main] Loading from:", LOCAL_PRICES_FILE);
        document.getElementById("status").textContent = "Loading 51MB price data (may take a moment)...";
        
        const response = await fetch(LOCAL_PRICES_FILE);
        if (!response.ok) {
          throw new Error(`Failed to load prices: ${response.status}`);
        }
        
        const prices = await response.json();
        console.log("[Main] Loaded", prices.length.toLocaleString(), "prices from local file");
        
        // Cache in memory
        cachedPrices = prices;
        
        return prices;
      }

      window.clearCache = function () {
        cachedPrices = null;
        document.getElementById("cache-status").textContent = "Cleared";
        document.getElementById("status").textContent = "Cache cleared - will reload on next test";
      };

      // Run test with percentage of total data
      window.runTestPct = async function (pct) {
        const status = document.getElementById("status");
        status.textContent = "Loading price data...";
        
        try {
          const priceData = await fetchPrices();
          const totalQuotes = priceData.length;
          const maxQuotes = Math.ceil((totalQuotes * pct) / 100);
          status.textContent = `Running with ${pct}% (${maxQuotes.toLocaleString()} of ${totalQuotes.toLocaleString()} quotes)...`;
          await runTest(maxQuotes);
        } catch (e) {
          status.textContent = "Error: " + e.message;
        }
      };

      window.runTest = async function (maxQuotes) {
        const status = document.getElementById("status");
        const output = document.getElementById("output");

        if (!workerReady) {
          status.textContent = "Worker not ready yet...";
          return;
        }

        try {
          status.textContent = "Loading price data...";
          let prices = await fetchPrices();

          if (!prices || prices.length === 0) {
            status.textContent = "No price data received";
            return;
          }

          // Limit to requested amount
          if (prices.length > maxQuotes) {
            prices = prices.slice(-maxQuotes);
          }

          // Calculate price range (use loop to avoid stack overflow with 1M elements)
          let minPrice = Infinity;
          let maxPrice = -Infinity;
          for (const p of prices) {
            const val = parseFloat(p.price);
            if (val < minPrice) minPrice = val;
            if (val > maxPrice) maxPrice = val;
          }
          const priceRange = maxPrice - minPrice;

          console.log("[Main] Using", prices.length.toLocaleString(), "quotes");
          console.log("[Main] Price range:", minPrice.toFixed(2), "-", maxPrice.toFixed(2));

          // Update UI
          document.getElementById("quotes-count").textContent = prices.length.toLocaleString();
          document.getElementById("price-range").textContent = "$" + priceRange.toFixed(0);

          // Set grid to exactly match price range (no buffer = more trades)
          const gridStart = minPrice.toFixed(2);
          const gridEnd = maxPrice.toFixed(2);

          const config = {
            grid_mode: "long",
            grid_levels: 200,  // Max grid levels for more trades
            start_price: gridStart,
            end_price: gridEnd,
            max_investment: "5000",
            leverage: "1",
            spread: "10",
          };

          console.log("[Main] Grid config:", config);
          status.textContent = `Running WASM backtest in Web Worker with ${prices.length.toLocaleString()} quotes...`;

          // Send to worker (runs on separate thread!)
          worker.postMessage({
            type: 'backtest',
            prices: prices,
            config: config,
            id: Date.now(),
          });
          
          // Result will come via worker.onmessage
        } catch (e) {
          console.error("[Main] Error:", e);
          status.textContent = "Error: " + e.message;
          output.textContent = e.stack || e.toString();
        }
      };
    </script>
  </body>
</html>
